<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>ServiceHub - Precision at Your Doorstep</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@200;400;600;700;800&amp;family=Inter:wght@300;400;500;600&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "on-primary-fixed-variant": "#003ea8",
              "surface-container": "#edeeef",
              "surface-container-low": "#f3f4f5",
              "on-tertiary-fixed-variant": "#7d2d00",
              "tertiary-container": "#bc4800",
              "surface-tint": "#0053db",
              "on-surface": "#191c1d",
              "surface-container-highest": "#e1e3e4",
              "on-secondary": "#ffffff",
              "tertiary-fixed-dim": "#ffb596",
              "surface-variant": "#e1e3e4",
              "on-secondary-fixed": "#2a1700",
              "on-tertiary": "#ffffff",
              "on-tertiary-container": "#ffede6",
              "secondary-fixed-dim": "#ffb95f",
              "surface-container-lowest": "#ffffff",
              "surface-container-high": "#e7e8e9",
              "secondary-fixed": "#ffddb8",
              "on-secondary-fixed-variant": "#653e00",
              "secondary": "#855300",
              "on-primary-fixed": "#00174b",
              "inverse-primary": "#b4c5ff",
              "inverse-on-surface": "#f0f1f2",
              "error": "#ba1a1a",
              "on-primary-container": "#eeefff",
              "background": "#f8f9fa",
              "tertiary-fixed": "#ffdbcd",
              "primary": "#004ac6",
              "error-container": "#ffdad6",
              "tertiary": "#943700",
              "on-surface-variant": "#434655",
              "on-error-container": "#93000a",
              "surface": "#f8f9fa",
              "on-background": "#191c1d",
              "on-primary": "#ffffff",
              "outline": "#737686",
              "on-tertiary-fixed": "#360f00",
              "on-error": "#ffffff",
              "inverse-surface": "#2e3132",
              "surface-dim": "#d9dadb",
              "secondary-container": "#fea619",
              "surface-bright": "#f8f9fa",
              "primary-fixed": "#dbe1ff",
              "primary-container": "#2563eb",
              "outline-variant": "#c3c6d7",
              "primary-fixed-dim": "#b4c5ff",
              "on-secondary-container": "#684000"
            },
            fontFamily: {
              "headline": ["Manrope"],
              "body": ["Inter"],
              "label": ["Inter"]
            },
            borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
          },
        },
      }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .loading-bar-animation {
            width: 40%;
            height: 3px;
            background: #2563eb;
            position: absolute;
            left: -40%;
            animation: move-progress 2s cubic-bezier(0.65, 0.05, 0.36, 1) infinite;
        }
        @keyframes move-progress {
            0% { left: -40%; }
            100% { left: 100%; }
        }
        .soft-float {
            animation: float 6s ease-in-out infinite;
        }
        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-surface-container-lowest font-body text-on-surface overflow-hidden">
<!-- Splash Screen Container -->
<main class="relative h-screen w-full flex flex-col items-center justify-center p-8">
<!-- Background Subtle Texture (Simulated via Gradients) -->
<div class="absolute inset-0 z-0 overflow-hidden pointer-events-none">
<div class="absolute -top-[10%] -left-[10%] w-[40%] h-[40%] bg-primary/5 rounded-full blur-[100px]"></div>
<div class="absolute -bottom-[10%] -right-[10%] w-[50%] h-[50%] bg-tertiary/5 rounded-full blur-[120px]"></div>
</div>
<!-- Central Content Canvas -->
<div class="relative z-10 flex flex-col items-center max-w-sm w-full">
<!-- Logo Section -->
<div class="mb-8 soft-float">
<div class="w-24 h-24 md:w-32 md:h-32 bg-primary rounded-xl flex items-center justify-center shadow-Premium">
<span class="material-symbols-outlined text-white text-6xl md:text-7xl" data-icon="house_with_shield" style="font-variation-settings: 'FILL' 1;">house_with_shield</span>
</div>
</div>
<!-- Identity Branding -->
<div class="text-center space-y-2">
<h1 class="font-headline font-extrabold text-4xl md:text-5xl text-primary tracking-tighter">
                    ServiceHub
                </h1>
<p class="font-body text-on-surface-variant text-lg tracking-wide opacity-80">
                    Precision at Your Doorstep
                </p>
</div>
<!-- Decorative Visual - Abstract Blueprint Element (using asymmetrical Bento-style logic) -->
<div class="mt-16 grid grid-cols-2 gap-3 w-full opacity-40">
<div class="h-1 bg-surface-container-highest rounded-full"></div>
<div class="h-1 bg-primary/20 rounded-full"></div>
<div class="h-1 bg-surface-container-highest rounded-full col-span-2"></div>
</div>
</div>
<!-- Bottom Initializing State -->
<div class="absolute bottom-20 left-0 right-0 flex flex-col items-center space-y-6">
<!-- Progress Indicator Container -->
<div class="w-48 h-[3px] bg-surface-container-highest rounded-full relative overflow-hidden">
<div class="loading-bar-animation"></div>
</div>
<!-- Trust Badge - Material Editorial style -->
<div class="flex items-center space-y-1 flex-col">
<div class="flex items-center space-x-2 px-4 py-1.5 bg-surface-container-low rounded-full">
<span class="material-symbols-outlined text-sm text-primary" data-icon="verified_user" style="font-variation-settings: 'FILL' 1;">verified_user</span>
<span class="font-label text-[10px] font-semibold uppercase tracking-[0.15em] text-on-surface-variant">Secure Marketplace</span>
</div>
</div>
</div>
<!-- Footer Legal/Architectural Anchor -->
<footer class="absolute bottom-8 left-0 right-0 text-center">
<span class="font-label text-[10px] text-on-surface-variant/40 uppercase tracking-widest">
                v2.4.0 • Enterprise Ready
            </span>
</footer>
</main>
<!-- Contextual Decorative Elements (Architect's Studio Feel) -->
<div class="fixed top-12 right-12 hidden md:block opacity-10 pointer-events-none">
<div class="w-64 h-64 border-[0.5px] border-outline rounded-full"></div>
<div class="absolute top-1/2 left-0 w-64 h-[0.5px] bg-outline transform -rotate-45"></div>
</div>
</body></html>
