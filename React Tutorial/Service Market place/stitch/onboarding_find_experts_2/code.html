</header>

<div class="bg-surface-container-lowest p-4 rounded-xl shadow-[0px_20px_40px_rgba(25,28,29,0.06)] flex items-center gap-4 border border-outline-variant/20">
<div class="w-12 h-12 rounded-full bg-secondary-container flex items-center justify-center text-on-secondary-container">
<span class="material-symbols-outlined" data-icon="verified" style="font-variation-settings: 'FILL' 1;">verified</span>
</div>
<div>

<p class="text-xs text-on-surface-variant">Background checked &amp; certified</p>
</div>
</div>
</div>
</section>
<!-- Content Section (40% Desktop) -->
<section class="w-full md:w-2/5 flex flex-col justify-center px-8 md:px-16 py-12 bg-surface-container-low relative">
<div class="max-w-md mx-auto md:mx-0">
<!-- Branding Context -->
<div class="inline-flex items-center gap-2 px-3 py-1 rounded-full bg-tertiary-container/10 text-tertiary-container mb-6">
<span class="text-[10px] font-bold tracking-widest uppercase">Expert Connect</span>
</div>
<!-- Main Copy -->
<h1 class="text-4xl md:text-5xl font-headline font-extrabold text-on-surface leading-[1.1] tracking-tight mb-6">
                    Find Your Master <span class="text-primary">Artisan</span>
</h1>
<p class="text-lg text-on-surface-variant leading-relaxed mb-10 opacity-80">

                </p>

<div class="space-y-8">
<button class="group w-full md:w-auto px-8 py-4 bg-gradient-to-br from-primary to-primary-container text-on-primary rounded-xl font-headline font-bold text-lg shadow-[0px_20px_40px_rgba(0,74,198,0.2)] hover:scale-[1.02] active:scale-95 transition-all flex items-center justify-center gap-3">
                        Next

</button>

<div class="h-1.5 w-1.5 rounded-full bg-outline-variant"></div>
<div class="h-1.5 w-1.5 rounded-full bg-outline-variant"></div>
</div>
</div>
